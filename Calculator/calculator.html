<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono&display=swap" rel="stylesheet">
<link href="calculator.css" rel="stylesheet">
</head>
<body>

<div class="label-top">Basic Calculator</div>

<div class="calc">
  <div class="display">
    <div class="display-label">Expression</div>
    <input type="text" id="d" placeholder="0" autocomplete="off" spellcheck="false">
  </div>

  <div class="grid">
    <div class="btn clr"  onclick="document.getElementById('d').value=''">AC</div>
    <div class="btn fn"   onclick="var e=document.getElementById('d');if(e.value)e.value=String(-parseFloat(e.value))">+/−</div>
    <div class="btn fn"   onclick="var e=document.getElementById('d');if(e.value)e.value=parseFloat(e.value)/100">%</div>
    <div class="btn op"   onclick="document.getElementById('d').value+='÷'">÷</div>

    <div class="btn num"  onclick="document.getElementById('d').value+='7'">7</div>
    <div class="btn num"  onclick="document.getElementById('d').value+='8'">8</div>
    <div class="btn num"  onclick="document.getElementById('d').value+='9'">9</div>
    <div class="btn op"   onclick="document.getElementById('d').value+='×'">×</div>

    <div class="btn num"  onclick="document.getElementById('d').value+='4'">4</div>
    <div class="btn num"  onclick="document.getElementById('d').value+='5'">5</div>
    <div class="btn num"  onclick="document.getElementById('d').value+='6'">6</div>
    <div class="btn op"   onclick="document.getElementById('d').value+='−'">−</div>

    <div class="btn num"  onclick="document.getElementById('d').value+='1'">1</div>
    <div class="btn num"  onclick="document.getElementById('d').value+='2'">2</div>
    <div class="btn num"  onclick="document.getElementById('d').value+='3'">3</div>
    <div class="btn op"   onclick="document.getElementById('d').value+='+'">+</div>

    <div class="btn num wide" onclick="document.getElementById('d').value+='0'">0</div>
    <div class="btn fn"       onclick="var e=document.getElementById('d');if(!e.value.includes('.'))e.value+='.'">.</div>
    <div class="btn eq"       onclick="
      var e=document.getElementById('d');
      var expr=e.value.replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-');
      try{var r=Function('return ('+expr+')')();e.value=parseFloat(r.toFixed(10));}
      catch(x){e.value='Error';}
    ">=</div>
  </div>
</div>

<div class="footer">HTML · CSS · JS onclick</div>

</body>
</html>
